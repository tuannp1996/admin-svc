name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: Test And Build
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.sha.outputs.short }}   # <-- share with deploy job

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Dependencies
        run: go mod download

      # - name: Run Unit Tests
      #   run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short   # produces sha-abc1234 (7 chars)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: GH_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,REGISTRY,IMAGE_NAME,SHORT_SHA
          script: |
            set -e

            IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
            SHA_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            docker pull "$SHA_TAG"
            docker tag  "$SHA_TAG" "$IMAGE"

            mkdir -p "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" fetch origin main
              git -C "$APP_DIR" checkout main
              git -C "$APP_DIR" pull --ff-only origin main
            else
              rm -rf "$APP_DIR"
              git clone --depth 1 --branch main "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            test -f docker-compose.yml

            export DOCKER_IMAGE="$IMAGE"
            docker compose up -d --no-build
            docker image prune -f
            docker compose ps
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          SHORT_SHA: ${{ needs.ci.outputs.image_tag }}  # <-- comes from ci job output