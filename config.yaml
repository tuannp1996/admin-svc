telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

blog_admin:
  base_url: "http://localhost:8087/api/admin/service"
  timeout_seconds: 30

scheduler:
  interval_seconds: 150  # How often to run all checks
  blog_report:
    enabled: true
    cron: "0 30 8 * * *" # Daily at 08:30 Asia/Ho_Chi_Minh
  jobs:
    - name: "blog_gen"
      enabled: true
      cron: "0 0 */3 * * *"   # Every 3 hours at minute 0 (6 fields: second minute hour day month weekday)
      service: "BLOG-AUTO"
      api: "BLOG Gen Article"
      topic_source: "redis"
      redis_addr: "localhost:6379"
      redis_password: ""
      redis_db: 0
      redis_topic_stream: "blog:topics:stream"
      redis_topic_wait_seconds: 20
      redis_topic_max_retries: 5
      redis_topic_dead_letter_stream: "blog:topics:stream:dlq"
    - name: "tik_users"
      enabled: true
      cron: "0 0 20 * * *"   # Every day at 20:00
      service: "TIKTOK-CONNECTOR"
      api: "TIKTOK Get Users"
      topic: ""

docker:
  enabled: true
  containers:
    - name: "minio"
      alert_on_stopped: true
    - name: "postgres-db"
      alert_on_stopped: true
    - name: "redis"
      alert_on_stopped: true

health_checks:
  enabled: true
  timeout_seconds: 10
  endpoints:
    - name: "Financi API Service"
      url: "http://localhost:8089/health"
      expected_status: 200
    - name: "Auto Blog Service"
      url: "http://localhost:8087/health"
      expected_status: 200
    - name: "Tiktok Connector Service"
      url: "http://localhost:3030/health"
      expected_status: 200
    - name: "Go Analytics Service"
      url: "http://localhost:8082/health"
      expected_status: 200

