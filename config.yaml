telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

scheduler:
  interval_seconds: 300  # How often to run all checks

docker:
  enabled: true
  containers:
    - name: "nginx"
      alert_on_stopped: true
    - name: "postgres"
      alert_on_stopped: true
    - name: "redis"
      alert_on_stopped: true

health_checks:
  enabled: true
  timeout_seconds: 10
  endpoints:
    - name: "API Service"
      url: "http://localhost:8089/health"
      expected_status: 200
    # - name: "Admin Panel"
    #   url: "http://localhost:3000/health"
    #   expected_status: 200

