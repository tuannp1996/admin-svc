page_checks:
  enabled: true
  timeout_seconds: 30
  pages:
    - name: "Landing Page"
      url: "https://financi.vn"
      expected_status: 200
      contains_text: ""   # optional: check page contains this string
      recovery_command: "systemctl restart financi.vn.service"
      recovery_timeout_seconds: 120
    # - name: "Dashboard"
    #   url: "https://financi.vn/dashboard"
    #   expected_status: 200
    #   contains_text: ""
clients:
  timeout_seconds: 300
  service:
    - name: "BLOG-AUTO"
      enabled: true
      api:
        - name: "BLOG Gen Article"
          enabled: true
          url: "http://localhost:8087/api/admin/generate-article"
          method: "POST"
          headers:
            Content-Type: "application/json"
          body: "{}"
          expected_status: 200
    - name: "TIKTOK-CONNECTOR"
      enabled: true
      api:
        - name: "TIKTOK Get Users"
          enabled: true
          url: "http://localhost:3030/users"
          method: "GET"
          headers:
            Content-Type: "application/json"
          body: "{}"
          expected_status: 200
